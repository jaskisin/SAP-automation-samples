name: Process Specific YAML File in SAP Directory

on:
  workflow_dispatch:

jobs:
  process-yaml-file:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16'
        
    - name: Install dependencies
      run: npm install js-yaml
      
    - name: Read YAML file attributes
      id: read-yaml
      uses: actions/github-script@v6
      with:
        run: |
          node -e "
          const fs = require('fs');
          const yaml = require('js-yaml');
          const filePath = 'SAP/SWPM20SP18_latest/SWPM20SP18_latest.yaml';
          const fileContents = fs.readFileSync(filePath, 'utf8');
          const data = yaml.load(fileContents);
          console.log(JSON.stringify(data));
          " > result.json
        
    - name: Output YAML attributes
      run: |
        echo "YAML attributes: $(cat result.json)"
