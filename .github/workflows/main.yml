name: Process Specific YAML File in SAP Directory on Windows

on:
  workflow_dispatch:

jobs:
  process-yaml-file:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Install yq
      run: |
        Invoke-WebRequest -Uri https://github.com/mikefarah/yq/releases/download/v4.34.2/yq_windows_amd64.exe -OutFile yq.exe
        ./yq.exe --version

    - name: Extract YAML attribute
      id: extract_yaml
      run: |
        $url = ./yq.exe eval '.materials.media[0].url' SAP/SWPM20SP18_latest/SWPM20SP18_latest.yaml
        echo "YAML url: $url"
        echo "::set-output name=url::$url"

    - name: Use the extracted version
      run: echo "The extracted URL is ${{ steps.extract_yaml.outputs.url }}"

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager requests

    - name: Create Selenium test script
      run: |
        Add-Content -Path your_test_script.py -Value @"
        from selenium import webdriver
        from selenium.webdriver.common.by import By
        from selenium.webdriver.chrome.service import Service
        from selenium.webdriver.chrome.options import Options
        from webdriver_manager.chrome import ChromeDriverManager
        import requests
        
        options = Options()
        #options.add_argument('--headless')
        options.add_argument('--no-sandbox')
        options.add_argument('--disable-dev-shm-usage')
        options.add_argument('--enable-javascript')
        
        driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=options)
        driver.get('https://accounts.sap.com/saml2/idp/sso?sp=sp.accounts.sap.com&RelayState=https://accounts.sap.com/ui/protected/profilemanagement')
        
        # Find the username field and input username
        usernameelement = driver.find_element(By.ID, 'j_username')
        usernameelement.send_keys('S0023762024')
        
        # Find the password field and input password
        passwordelement = driver.find_element(By.ID, 'j_password')
        passwordelement.send_keys('Azureuser23!')
        
        # Find the login button and click it
        loginelement = driver.find_element(By.ID, 'logOnFormSubmit')
        loginelement.click()

        # Wait for the page to load properly
        driver.implicitly_wait(10)

        # Access the XML URL
        xml_url = 'https://launchpad.support.sap.com/services/odata/svt/swdcuisrv/ObjectSet(\'0020000000743952024\')?sap-language=en'
        cookies = {cookie['name']: cookie['value'] for cookie in driver.get_cookies()}
        response = requests.get(xml_url, cookies=cookies)
        print(response.text)
        
        driver.quit()
        "@

    - name: Run Selenium tests
      run: |
        python your_test_script.py
