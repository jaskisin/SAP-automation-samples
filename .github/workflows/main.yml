name: Process Specific YAML File in SAP Directory

on:
  workflow_dispatch:

jobs:
  process-yaml-file:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Read YAML file attributes
      id: read-yaml
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const yaml = require('js-yaml');
          const filePath = 'SAP/SWPM20SP18_latest/SWPM20SP18_latest.yaml';
          const fileContents = fs.readFileSync(filePath, 'utf8');
          const data = yaml.load(fileContents);
          return data;  // Replace with your specific attribute if needed

    - name: Output YAML attributes
      run: |
        echo "YAML attributes: ${{ steps.read-yaml.outputs.result }}"
