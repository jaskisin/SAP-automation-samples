name: Process Specific YAML File in SAP Directory

on:
  workflow_dispatch:

jobs:
  process-yaml-file:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      
    - name: Install yq
      run: |
        wget https://github.com/mikefarah/yq/releases/download/v4.34.2/yq_linux_amd64 -O yq
        chmod +x yq

    - name: Extract YAML attribute
      id: extract_yaml
      run: |
        # Extract the 'version' attribute from the YAML file
        url=$(./yq eval '.materials.media[0].url' SAP/SWPM20SP18_latest/SWPM20SP18_latest.yaml)
        echo "YAML url: $url"
        # Set the extracted value as an output for later use
        echo "::set-output name=url::$url"

    - name: Use the extracted version
      run: echo "The extracted version is ${{ steps.extract_yaml.outputs.url }}"

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager

    - name: Create Selenium test script
      run: |
        echo "from selenium import webdriver
        from selenium.webdriver.common.by import By
        from selenium.webdriver.chrome.service import Service
        from webdriver_manager.chrome import ChromeDriverManager
        
        driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()))
        driver.get('${{ steps.extract_yaml.outputs.url }}')
        button = driver.find_element(By.ID, 'exampleButton')
        button.click()
        driver.quit()" > your_test_script.py

    - name: Run Selenium tests
      run: |
        python your_test_script.py
